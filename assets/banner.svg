<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f1923;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a2744;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff9900;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffad33;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="800" height="200" rx="12" fill="url(#bg)"/>
  <!-- Terminal prompt -->
  <text x="40" y="55" font-family="SF Mono, Fira Code, Consolas, monospace" font-size="13" fill="#6b7280">$</text>
  <text x="58" y="55" font-family="SF Mono, Fira Code, Consolas, monospace" font-size="13" fill="#e5e7eb">amz search "running shoes" --sort price_asc</text>
  <!-- Title -->
  <text x="40" y="105" font-family="system-ui, -apple-system, sans-serif" font-size="38" font-weight="700" fill="#ffffff">amz</text>
  <text x="130" y="105" font-family="system-ui, -apple-system, sans-serif" font-size="38" font-weight="300" fill="#9ca3af">Amazon.in in your terminal</text>
  <!-- Subtitle -->
  <text x="40" y="135" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#6b7280">Search products | Compare prices | View details | Read reviews</text>
  <!-- Amazon smile arrow -->
  <path d="M 40 165 Q 100 185 160 165" stroke="url(#accent)" stroke-width="3" fill="none" stroke-linecap="round"/>
  <polygon points="155,160 165,165 155,170" fill="#ff9900"/>
  <!-- Tags -->
  <rect x="200" y="155" width="55" height="22" rx="4" fill="rgba(255,153,0,0.15)"/>
  <text x="227" y="170" font-family="system-ui, sans-serif" font-size="11" fill="#ff9900" text-anchor="middle">Python</text>
  <rect x="265" y="155" width="40" height="22" rx="4" fill="rgba(255,153,0,0.15)"/>
  <text x="285" y="170" font-family="system-ui, sans-serif" font-size="11" fill="#ff9900" text-anchor="middle">CLI</text>
  <rect x="315" y="155" width="70" height="22" rx="4" fill="rgba(255,153,0,0.15)"/>
  <text x="350" y="170" font-family="system-ui, sans-serif" font-size="11" fill="#ff9900" text-anchor="middle">No login</text>
</svg>
